kind = "web"
previewPath = "/"
title = "Coffee Shop"
version = "1.0.0"
id = "artifacts/coffee-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22964

[services.development]
run = "pnpm --filter @workspace/coffee-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coffee-shop", "run", "build" ]
publicDir = "artifacts/coffee-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22964"
BASE_PATH = "/"
